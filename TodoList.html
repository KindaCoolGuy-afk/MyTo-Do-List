    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif ;
        }

        .head{
            display: flex;
            column-gap: 10px;
            align-items: center;
            border-bottom:  gray;
            padding: 10px 10px  10px 10px;
            position: sticky;
            top: 0;
            box-shadow: 4px 4px 5px rgba(158, 158, 158, 0.301);
            transition: box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out;
            color: white;
            background-color: blue;
            min-width: 100dvh;
        }

        .title-2{
            font-family: "Lucida Handwriting", "Brush Script MT", cursive;
        }

        .task-tittle-header{
            padding: 5px 0 0 5px;
            background-color: blue;
            color: white;
            border-radius: 5px 5px 0 0;
        }

        .section{
            margin-top: 2%;
            padding: 0 auto;
        }

        .container{
            width: 50%;
            margin: 0 auto;
            width: 60dvh;
            height: 600px;
            box-shadow: 4px 4px 4px 6px rgba(158, 158, 158, 0.301);
            border-radius: 5px;
            border: 1px solid rgba(176, 163, 163, 0.301);
        }

        .list-board{
            display: flex;
            flex-direction: column;
            align-content: center;
            justify-items: center;
        }

        .inputs{
            margin-top: 5px;
            width: 350px;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            border: 1px solid gray;
            
        }
        

        .task-container{
            max-height: 280px;
            overflow-y: auto;
            margin-top: 105px;
            display: flex;
            justify-content: center;
        }


        ::-webkit-scrollbar{
            display: none;
        }

        .task-enter{
            position: relative;
            left: 2%;
        }

        .input-label{
            display: flex;
            justify-content: center;
            flex-direction: column;
            margin: 5px 0 0 0;
        }

        .msg-error{
            position: relative; left: 10%; margin-top: 3px; display: flex; color:red; align-items: center; background: rgba(225, 185, 185, 0.938); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); height: 30px; width: 130px; border: 1px solid black; color: red; font-size: 12px;
        }

        .input-stat{
            display: flex;
            flex-direction: column;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .category{
             position: relative;
             left: 2%;
        }

        #taskStatus{
            width: 120px;
            height: 35px;
            border-radius: 10px;
        }

        .options{
            position: relative;
            left: 10%;
        }

        .inp{
            text-align: center;
        }

        .Addtaskbtn{
            text-align: center;
        }
        
        .submitBtn{
            height: 35px;
            width: 140px;
            border-radius: 10px;
            outline: none;
            border: 1px solid gray;
        }

        #all-stat:disabled{
            filter: grayscale(100%);
            opacity: 0.6;
            cursor: not-allowed;
        }

        i, .submitBtn{
            font-size: 12px;
        }

    </style>
</head>
